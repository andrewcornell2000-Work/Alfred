name: Alfred Weekly Digest

on:
  schedule:
    # Monday 12:00 noon AEST (02:00 UTC; drifts to 13:00 during AEDT)
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Alfred
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send weekly digest email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python .github/scripts/alfred_weekly_digest.py
